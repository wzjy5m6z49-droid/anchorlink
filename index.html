<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
/>

<title>Back To Top</title>

<style>

html,
body{
  margin:0;
  padding:0;

  width:100%;
  height:100%;

  background:transparent;
  overflow:hidden;

  font-family:
    "Segoe UI",
    sans-serif;
}

/* 右下固定ボタン */
.backTop{

  position:fixed;

  right:20px;
  bottom:20px;

  width:58px;
  height:58px;

  border:none;
  border-radius:999px;

  cursor:pointer;

  display:flex;
  align-items:center;
  justify-content:center;

  color:#ffffff;
  font-size:28px;
  font-weight:700;

  background:
    linear-gradient(
      135deg,
      rgba(14,165,233,.92),
      rgba(99,102,241,.92)
    );

  box-shadow:
    0 12px 32px rgba(0,0,0,.28),
    inset 0 1px 0 rgba(255,255,255,.35);

  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);

  transition:
    transform .25s ease,
    box-shadow .25s ease,
    filter .25s ease;
}

.backTop:hover{

  transform:
    translateY(-4px)
    scale(1.06);

  box-shadow:
    0 18px 40px rgba(14,165,233,.35),
    inset 0 1px 0 rgba(255,255,255,.45);

  filter:brightness(1.08);
}

.backTop:active{

  transform:scale(.96);
}

/* アイコン */
.arrow{

  transform:
    translateY(-1px);
}

</style>
</head>

<body>

<button
  class="backTop"
  onclick="goTop()"
  aria-label="ページ上部へ戻る"
>
  <span class="arrow">↑</span>
</button>

<script>

function goTop(){

  console.log('scroll test start');

  /* =========================
     1. parent scroll
  ========================= */

  try{

    window.parent.scrollTo({
      top:0,
      behavior:'smooth'
    });

    console.log('parent scroll success');

  }catch(e){

    console.log('parent scroll failed');
  }

  /* =========================
     2. top scroll
  ========================= */

  try{

    window.top.scrollTo({
      top:0,
      behavior:'smooth'
    });

    console.log('top scroll success');

  }catch(e){

    console.log('top scroll failed');
  }

  /* =========================
     3. 保険
     数秒後にURL遷移
  ========================= */

  setTimeout(()=>{

    const spoPageUrl =
      'https://digitalgojp.sharepoint.com/sites/NTA_IBHub12/SitePages/test.aspx';

    // 必要ならコメント解除
    // window.top.location.href = spoPageUrl;

  },1500);

}

</script>

</body>
</html>
