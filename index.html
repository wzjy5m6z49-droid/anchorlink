<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Back To Top</title>

<style>
html,
body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  background:transparent;
  overflow:hidden;
  font-family:"Segoe UI",sans-serif;
}

.backTop{
  position:fixed;
  right:20px;
  bottom:20px;

  width:58px;
  height:58px;
  border-radius:999px;

  display:flex;
  align-items:center;
  justify-content:center;

  text-decoration:none;
  color:#ffffff;
  font-size:28px;
  font-weight:700;

  background:
    linear-gradient(
      135deg,
      rgba(14,165,233,.92),
      rgba(99,102,241,.92)
    );

  box-shadow:
    0 12px 32px rgba(0,0,0,.28),
    inset 0 1px 0 rgba(255,255,255,.35);

  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);

  transition:
    transform .25s ease,
    box-shadow .25s ease,
    filter .25s ease;
}

.backTop:hover{
  transform:translateY(-4px) scale(1.06);

  box-shadow:
    0 18px 40px rgba(14,165,233,.35),
    inset 0 1px 0 rgba(255,255,255,.45);

  filter:brightness(1.08);
}

.backTop:active{
  transform:scale(.96);
}

.arrow{
  transform:translateY(-1px);
}
</style>
</head>

<body>

<a
  class="backTop"
  href="https://digitalgojp.sharepoint.com/sites/NTA_IBHub12/SitePages/test.aspx#%E3%81%82"
  target="_top"
  aria-label="ページ上部へ戻る"
  title="ページ上部へ戻る"
>
  <span class="arrow">↑</span>
</a>

</body>
</html>
